[project]
main_file = "paper.tex"
bib_files = ["refs.bib", "extra.bib"]
src_dir = "src"

[lint]
disabled_rules = ["L09", "L10"]
fix_rules = ["L01", "L04"]

[lint.severity_overrides]
L05 = "warning"

[verify]
s2_api_key = "test-key-123"
timeout = 30
skip_keys = ["draft2025"]
max_concurrent = 3
max_requests_per_second = 0.5

[translate]
target_lang = "zh"

[translate.glossary]
"fully homomorphic encryption" = "全同态加密"
"bootstrapping" = "自举"

[survey]
default_topic = "FHE accelerator"
max_results = 200
sources = ["s2", "arxiv"]
